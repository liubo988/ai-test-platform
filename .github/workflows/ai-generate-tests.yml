name: AI Generate Tests from Edge Cases

on:
  push:
    paths:
      - 'edge-cases/**'
  workflow_dispatch:

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate tests from edge cases
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'api-proxy-codex/gpt-5.3-codex' }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
        run: npm run edge:generate
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'test(edge-cases): auto-generate tests'
          title: 'test: auto-generate tests from edge cases'
          body: |
            Auto-generated by workflow **AI Generate Tests from Edge Cases**.
            - Source: edge-cases/*
            - Output: tests/integration/generated/*
            - Summary: reports/generation-summary.json
          branch: chore/auto-generated-tests
          delete-branch: true
